<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #header{
            width: 800px;
            margin : 0 auto;
            background: red;
        }
        #wrap{
            width: 800px;
            margin: 0 auto;
            overflow: hidden;
        }
        #aside{
            width: 200px;
            float: left;
            background: blue;
        }
        #content{
            width: 600px;
            float: left;
            background: green;
        }
        .select{
            color: blueviolet;
        }
        .item{
            background: blue;
        }
        input[type="text"]{
            background: #333333;
        }
        input[type="password"]{
            background: #222222;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>헤더 태그</h1>
    </div>
    <div id="wrap">
        <div id="aside">
           <p class="select">asdie 태그</p> 
        </div>
        <div id="content">
            <ol>
                <li class="select item">사과</li>
                <li>바나나</li>
                <li class="select">오렌지</li>
                <li>키위</li>
            </ol>
        </div>
    </div>
    <form>
        <input type="text">
        <input type="password">
    </form>
</body>
</html>
