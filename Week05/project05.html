<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>회원가입</h1>
    <form>
        <fieldset> 
            <legend>회원 정보</legend>
            <table>
                <tr>
                    <td>날짜</td>
                    <td><input type="month"></td>
                </tr>

                <tr>
                    <th>작성자</th>
                    <td><input type="text" autofocus></td>
                </tr>

                <tr>
                    <th>비밀번호</th>
                    <td><input type="password"></td>
                </tr>

                <tr>
                    <th>이메일</th>
                    <td><input type="email"></td>
                </tr>

                <tr>
                    <th>성별</th>
                    <td><input type="radio" name="gender" value="m">남성
        <input type="radio" name="gender" value="w">여성</td>
                </tr>

                <tr>
                    <th>휴대폰</th>
                    <td>
                        <select>
                            <option>010</option>
                            <option>011</option>
                            <option>016</option>
                            <option>017</option>
                            <option>018</option>
                            <option>019</option>
                        </select>
                    -
                    <input type="text" size="4" maxlength="4">
                    -
                    <input type="text" size="4" maxlength="4">
                    </td>
                </tr>
                
                <tr>
                    <th>취미</th>
                    <td><input type="checkbox">등산
                        <input type="checkbox">낚시
                        <input type="checkbox">게임
                        <input type="checkbox">산책
                        <input type="checkbox">독서
                    </td>
                </tr>

                <tr>
                    <th>글제목</th>
                    <td><input type="text"></td>
                </tr>

                <tr>
                    <th>내용</th>
                    <td><textarea cols="50" rows="10"></textarea></td>
                </tr>

                <tr>
                    <th>파일첨부</th>
                    <td><input type="file"></td>
                </tr>

                <tr>
                    <td colspan="2">
                        <input type="submit" value="제출">
                        <input type="reset" value="초기화">
                        <input type="button" value="공지창열기">
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>
