<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form bindsubmit="">
        <fieldset> 
            <legend>입력양식</legend>
        아이디: <input type="text"> <br>
        패스워드: <input type="password"><br>
        사진파일: <input type="file"><br>

        성별: <input type="radio" name="gender" value="m">남성
        <input type="radio" name="gender" value="w">여성<br>
        <input type="hidden"><br>

        좋아하는 한식: <select name="" id="" multiple="multiple">
            <option value="">김밥</option>
            <option value="">떡볶이</option>
            <option value="">순대</option>
            <option value="">어묵</option>
        </select>
        좋아하는 일식: <select name="" id="">
            <option value="">스시</option>
            <option value="">우동</option>
            <option value="">덴푸라</option>
            <option value="">라멘</option>

        </select>
        <br>
        <!-- 분류, 그룹 -->
        <select name="" id="">
            <optgroup label="분식">
                <option value="">김밥</option>
                <option value="">떡볶이</option>
                <option value="">순대</option>
                <option value="">어묵</option>
            </optgroup>
            <optgroup label="일식">
                <option value="">스시</option>
                <option value="">우동</option>
                <option value="">덴푸라</option>
                <option value="">라멘</option>
            </optgroup>
        </select>
        <input type="button" value="사진 업로드"><br>
        <input type="reset" value="새로쓰기"><br>
        <input type="submit" value="회원가입완료"><br>
        <input type="image" src="https://www.gknu.ac.kr/resources/homepage/main/img/logo-w.svg">

         </fieldset>
    </form>
</body>
</html>
